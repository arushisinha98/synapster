<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CTRNN-Viewer · Wireframes</title>
<link rel="stylesheet" href="sketchy.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #e8e6dd; font-family: 'Kalam', cursive; }
  body { overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="../tweaks-panel.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="wf-a.jsx"></script>
<script type="text/babel" src="wf-b.jsx"></script>
<script type="text/babel" src="wf-c.jsx"></script>
<script type="text/babel" src="wf-d.jsx"></script>
<script type="text/babel" src="wf-e.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showAnnotations": true,
  "density": "normal",
  "accent": "red"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // expose tweaks globally for wireframes if needed later
  React.useEffect(() => { window.__tweaks = t; }, [t]);

  return (
    <>
      <DesignCanvas title="CTRNN-Viewer · dashboard wireframes" subtitle="4 directions · 3hr london hack scope · pick chrome before claude-coding the impl">
        <DCSection id="chosen" title="Chosen direction · D + agent-on-left + real 3D brain">
          <DCArtboard id="e" label="E · D-style toolbelt, agent left rail, live three.js cortex" width={1440} height={900}>
            <WireframeE />
          </DCArtboard>
        </DCSection>
        <DCSection id="layouts" title="Earlier layout explorations">
          <DCArtboard id="a" label="A · classic 3-pane DAW" width={1440} height={900}>
            <WireframeA />
          </DCArtboard>
          <DCArtboard id="b" label="B · viewport-dominant, floating panels" width={1440} height={900}>
            <WireframeB />
          </DCArtboard>
          <DCArtboard id="c" label="C · LLM-first / agent-led" width={1440} height={900}>
            <WireframeC />
          </DCArtboard>
          <DCArtboard id="d" label="D · figma-style toolbelt + timeline" width={1440} height={900}>
            <WireframeD />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Wireframe tweaks">
        <TweakSection title="display">
          <TweakToggle label="show annotations" value={t.showAnnotations} onChange={v => setTweak('showAnnotations', v)} />
          <TweakRadio
            label="RNN unit density"
            value={t.density}
            options={[{value:'sparse',label:'sparse'},{value:'normal',label:'normal'},{value:'dense',label:'dense'}]}
            onChange={v => setTweak('density', v)}
          />
          <TweakRadio
            label="stim accent"
            value={t.accent}
            options={[{value:'red',label:'red'},{value:'blue',label:'blue'},{value:'amber',label:'amber'}]}
            onChange={v => setTweak('accent', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
