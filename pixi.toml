[workspace]
authors = ["Arushi Sinha <115908316+arushisinha98@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "synapster"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
# `enigmatoolbox` is intentionally NOT in the smoke test — it's only needed
# for one-time setup (scripts/setup_data.py and scripts/generate_centroids.py)
# and not at training/inference time.
smoke = "python -c \"import torch, neurogym; print('deps ok | torch', torch.__version__, '| cuda', torch.cuda.is_available(), '| mps', torch.backends.mps.is_available())\""
serve = "python ctrnn/infer_server.py"
llm = "python llm/protocol_agent.py"

[dependencies]
python = "3.11.*"
pytorch = ">=2.2"
numpy = ">=2.1.0, <2.2.0"
scipy = ">=1.14.0, <1.15.0"
nibabel = ">=5.2"
matplotlib = ">=3.9.0, <3.10.0"
tqdm = ">=4.66"
requests = ">=2.31"
python-dotenv = ">=1.0"
fastapi = ">=0.110"
uvicorn = ">=0.29"
pydantic = ">=2.6"
pandas = ">=3.0.2,<4"
vtk = ">=9.6.1,<10"
scikit-learn = ">=1.8.0,<2"

[pypi-dependencies]
neurogym = ">=2.0"
gym = "*"
anthropic = ">=0.40"
openai = ">=1.40"
arxiv = ">=2.1"

# Two envs: `default` (CPU/MPS, used on macOS) and `hpc` (CUDA on linux-64).
# Run training on the cluster with: pixi run -e hpc python ctrnn/train.py ...
[feature.cpu.dependencies]
pytorch = ">=2.2"

[feature.cuda]
platforms = ["linux-64"]

[feature.cuda.system-requirements]
cuda = "12"

[feature.cuda.dependencies]
pytorch-gpu = ">=2.2"

[environments]
default = { features = ["cpu"], solve-group = "cpu" }
hpc = { features = ["cuda"], solve-group = "cuda" }
