[workspace]
authors = ["Arushi Sinha <115908316+arushisinha98@users.noreply.github.com>"]
channels = ["conda-forge", "pytorch"]
name = "synapster"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
smoke = "python -c \"import torch, neurogym, enigmatoolbox; print('deps ok | torch', torch.__version__, '| mps', torch.backends.mps.is_available())\""
train = "python ctrnn/train.py"
infer = "python ctrnn/infer.py"
llm = "python llm/protocol_agent.py"

[dependencies]
python = "3.11.*"
pytorch = ">=2.2"
numpy = ">=1.26"
scipy = ">=1.11"
nibabel = ">=5.2"
matplotlib = ">=3.8"
tqdm = ">=4.66"
requests = ">=2.31"
python-dotenv = ">=1.0"
fastapi = ">=0.110"
uvicorn = ">=0.29"
pydantic = ">=2.6"

[pypi-dependencies]
neurogym = ">=2.0"
gym = "==0.21.0"
enigmatoolbox = ">=2.0.3"
anthropic = ">=0.40"
openai = ">=1.40"
arxiv = ">=2.1"
